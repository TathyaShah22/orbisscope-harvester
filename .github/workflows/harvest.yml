name: OrbisScope Market Predictor

on:
  schedule:
    - cron: "17 * * * *" # LightGBM signals refresh hourly (offset from engine)
  workflow_dispatch:

jobs:
  run-predictor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Generate market signals
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python predictor.py
